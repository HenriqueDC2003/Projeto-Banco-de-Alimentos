services:
  postgres:
    image: postgres:15
    container_name: banco_alimentos_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: banco_alimentos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d banco_alimentos"]
      interval: 5s
      timeout: 5s
      retries: 5

  fastapi:
    build: ./app
    container_name: banco_alimentos_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://admin:admin123@postgres:5432/banco_alimentos
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: banco_alimentos_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - fastapi

volumes:
  pgdata: