services:
  postgres:
    image: postgres:15
    container_name: banco_alimentos_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: banco_alimentos_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ENVIRONMENT: ${ENVIRONMENT}
      ADMIN_NOME: ${ADMIN_NOME:-Administrador}
      ADMIN_SOBRENOME: ${ADMIN_SOBRENOME:-Sistema}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@bancoalimentos.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: banco_alimentos_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - internal
    depends_on:
      - fastapi

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
